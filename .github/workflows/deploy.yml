name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via webhook
        run: |
          curl -f -X POST https://energydess.ru/deploy-hook \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}" \
            --connect-timeout 15 --retry 5 --retry-delay 5 --retry-all-errors

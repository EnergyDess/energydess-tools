<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — EnergyDess</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
  {% include '_admin_styles.html' %}
</head>
<body>

{% include '_admin_nav.html' %}

<div class="admin-wrap">
  {% set active = 'dashboard' %}
  {% include '_admin_subnav.html' %}

  <h1>Панель управления</h1>
  <p class="subtitle">Выберите раздел</p>

  <div class="admin-tiles">
    <a href="/admin/users" class="card admin-tile">
      <div class="admin-tile-count">{{ users_count }}</div>
      <div class="admin-tile-label">Пользователи</div>
    </a>
    <a href="/admin/products" class="card admin-tile">
      <div class="admin-tile-count">{{ foods_count }}</div>
      <div class="admin-tile-label">Продукты</div>
    </a>
    <a href="/admin/exercises" class="card admin-tile">
      <div class="admin-tile-count">{{ exercises_count }}</div>
      <div class="admin-tile-label">Упражнения</div>
    </a>
  </div>
</div>

</body>
</html>

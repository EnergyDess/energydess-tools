<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — EnergyDess</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <script src="/static/theme.js"></script>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .auth-wrap {
      min-height: calc(100vh - 65px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-box h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .auth-box p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus { border-color: var(--accent); }

    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 44px; }
    .eye-btn {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      transition: color 0.2s;
      padding: 0;
    }
    .eye-btn:hover { color: var(--text-dim); }
    .eye-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.875rem;
      color: var(--text-dim);
    }
    .auth-footer a { color: #a78bfa; text-decoration: none; }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.875rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">⚡ EnergyDess</a>
  <ul class="nav-links">
    <li><a href="/register">Регистрация</a></li>
  </ul>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <h1>Вход</h1>
    <p>Введите email и пароль для входа</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <div class="input-wrap">
          <input type="password" id="pwd" name="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="toggleEye('pwd', this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary">Войти</button>
    </form>

    <div class="auth-footer">
      Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </div>
  </div>
</div>

<script>
function toggleEye(inputId, btn) {
  const input = document.getElementById(inputId);
  const svg = btn.querySelector('svg');
  if (input.type === 'password') {
    input.type = 'text';
    svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — EnergyDess</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <script src="/static/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<script src="/static/effects.js"></script>

<nav class="nav">
  <a href="/" class="nav-logo">
    <span class="nav-logo-symbol">⚡</span>
    <span>EnergyDess</span>
  </a>
  <ul class="nav-links">
    <li><a href="/register">Регистрация</a></li>
  </ul>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <h1>Вход</h1>
    <p>Введите email и пароль для входа</p>

    {% if info %}
    <div class="success-msg">{{ info }}</div>
    {% endif %}
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <div class="input-wrap">
          <input type="password" id="pwd" name="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="toggleEye('pwd', this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="auth-btn-primary">Войти</button>
    </form>

    <div style="text-align:right;margin-top:10px">
      <a href="/forgot-password" style="font-size:0.8rem;color:var(--text-dim);text-decoration:none;transition:color .2s"
         onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-dim)'">
        Забыли пароль?
      </a>
    </div>

    <div class="auth-footer">
      Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </div>
  </div>
</div>

<script>
function toggleEye(inputId, btn) {
  const input = document.getElementById(inputId);
  const svg = btn.querySelector('svg');
  if (input.type === 'password') {
    input.type = 'text';
    svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый пароль — EnergyDess</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">
    <span class="nav-logo-symbol">⚡</span>
    <span>EnergyDess</span>
  </a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    {% if done %}
      <div style="text-align:center">
        <div style="font-size:2.2rem;margin-bottom:14px">✅</div>
        <h1 style="margin-bottom:10px">Пароль изменён</h1>
        <p style="margin-bottom:24px">Теперь можно войти с новым паролем.</p>
        <a href="/login" class="auth-btn-primary" style="display:block;text-align:center;text-decoration:none">
          Войти →
        </a>
      </div>
    {% else %}
      <h1>Новый пароль</h1>
      <p>Придумайте новый пароль для вашего аккаунта</p>

      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form method="post" action="/reset-password/{{ token }}">
        <div class="form-group">
          <label>Новый пароль</label>
          <div class="input-wrap">
            <input type="password" id="pwd1" name="password" placeholder="Минимум 6 символов" required autocomplete="new-password">
            <button type="button" class="eye-btn" onclick="toggleEye('pwd1',this)" tabindex="-1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Повторите пароль</label>
          <div class="input-wrap">
            <input type="password" id="pwd2" name="password2" placeholder="••••••••" required autocomplete="new-password">
            <button type="button" class="eye-btn" onclick="toggleEye('pwd2',this)" tabindex="-1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-btn-primary">Сохранить пароль</button>
      </form>
    {% endif %}
  </div>
</div>

<script>
function toggleEye(id, btn) {
  const inp = document.getElementById(id);
  const svg = btn.querySelector('svg');
  if (inp.type === 'password') {
    inp.type = 'text';
    svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
</script>
</body>
</html>

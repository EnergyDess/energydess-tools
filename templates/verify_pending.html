<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подтвердите email — EnergyDess</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <script src="/static/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<script src="/static/effects.js"></script>

<nav class="nav">
  <a href="/" class="nav-logo">
    <span class="nav-logo-symbol">⚡</span>
    <span>EnergyDess</span>
  </a>
</nav>

<div class="auth-wrap">
  <div class="auth-box" style="text-align:center">
    <div style="font-size:2.5rem;margin-bottom:16px">✉️</div>
    <h1 style="margin-bottom:10px">Проверьте почту</h1>
    <p style="margin-bottom:28px">
      Мы отправили письмо с ссылкой для подтверждения.<br>
      Перейдите по ссылке из письма чтобы активировать аккаунт.
    </p>
    <p style="font-size:0.82rem;color:var(--text-faint);margin-bottom:24px">
      Письмо может прийти в течение нескольких минут.<br>
      Проверьте папку «Спам» если не видите.
    </p>
    <a href="/login" style="color:var(--accent);font-size:0.875rem;text-decoration:none">
      ← Вернуться к входу
    </a>
  </div>
</div>
</body>
</html>
